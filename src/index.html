<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https:; img-src 'self' data: http: https:; connect-src 'self' http: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.tailwindcss.com">
    <title>IMTI – Operator Command Center</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">

    <!-- Tailwind CSS (for Stitch Design) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        corePlugins: { preflight: false }, // Prevent breaking existing SCSS
        theme: {
          extend: {
            colors: {
              "primary": "#5B4FE6",
              "secondary": "#8B7FF0",
              "tertiary": "#A4FF00",
              "background": "#FAFAFE",
              "surface": "#FFFFFF",
              "surface-variant": "#F5F4FC",
              "outline": "#E0DDEE",
              "outline-variant": "#C9C5DC",
              "error": "#DC2626",
              "error-container": "#FCEBEB",
              "on-primary": "#FFFFFF",
              "on-surface": "#1A1730",
              "on-surface-variant": "#645E80",
              "on-error": "#FFFFFF",
              "on-error-container": "#B0201F"
            },
            fontFamily: {
              "headline": ["IBM Plex Sans", "sans-serif"],
              "body": ["IBM Plex Sans", "sans-serif"],
              "label": ["IBM Plex Sans", "sans-serif"],
              "technical": ["IBM Plex Mono", "monospace"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
    <style>
        .technical-font { font-family: 'IBM Plex Mono', monospace; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        .violet-glow {
            filter: drop-shadow(0px 0px 8px rgba(139, 127, 240, 0.4));
        }
        .primary-glow {
            box-shadow: 0px 4px 20px rgba(91, 79, 230, 0.3);
        }
        /* Force text-outline to be more visible and darker, without affecting border-outline */
        .text-outline {
            color: #645E80 !important; /* Same as on-surface-variant */
            font-weight: 500;
        }
    </style>
</head>

<body>
    <!-- Vue App Mount Point -->
    <div id="app"></div>

    <!-- SDK (device API wrapper) -->
    <script src="sdk.js"></script>

    <!-- Vue 3 Runtime -->
    <script src="../node_modules/vue/dist/vue.global.prod.js"></script>

    <!-- Composables -->
    <script src="composables/useAuthenticity.js"></script>
    <script src="composables/useHardwareTest.js"></script>
    <script src="composables/useCosmetic.js"></script>

    <!-- Services & Persistence -->
    <script src="services/DatabaseService.js"></script>
    <script src="composables/useSession.js"></script>

    <!-- Components -->
    <script src="components/ToastContainer.js"></script>
    <script src="components/AppHeader.js"></script>
    <script src="components/Sidebar.js"></script>
    <script src="components/StatusBar.js"></script>
    <script src="components/LoadingOverlay.js"></script>
    <script src="components/EmptyState.js"></script>
    <script src="components/DeviceCard.js"></script>

    <!-- Views -->
    <script src="views/Splash.js"></script>
    <script src="views/HomeView.js"></script>
    <script src="views/AuthenticityView.js"></script>
    <script src="views/ConnectDeviceView.js"></script>
    <script src="views/HardwareTestView.js"></script>
    <script src="views/CosmeticView.js"></script>
    <script src="views/PricingView.js"></script>

    <!-- Main App (must be last) -->
    <script src="app.js"></script>
</body>

</html>
